<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>180일 해빗 트래커</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FAFBFE; --card: #FFFFFF; --primary: #6C63FF; --primary-light: #EDE9FF;
            --success: #2DD4A0; --success-light: #E6FBF5; --warning: #FFB84D;
            --danger: #FF6B6B; --text: #1E1E3A; --text-sub: #8E8EA9; --text-light: #B4B4CC;
            --border: #EDEDF5; --shadow: 0 4px 20px rgba(108,99,255,0.06);
            --shadow-lg: 0 8px 32px rgba(108,99,255,0.1); --radius: 20px; --radius-sm: 14px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 90px; overflow-x: hidden; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header-left h2 { font-size: 20px; font-weight: 700; }
        .header-left .date { font-size: 13px; color: var(--text-sub); margin-top: 2px; }
        .phase-badge { padding: 6px 12px; background: var(--primary-light); color: var(--primary); border-radius: 99px; font-size: 12px; font-weight: 600; }

        /* CREATURE CARD */
        .creature-card {
            background: linear-gradient(135deg, #FFF8E1 0%, #FFF3C4 50%, #FFE082 100%);
            border-radius: var(--radius); padding: 28px 24px; text-align: center;
            margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: var(--shadow-lg);
            transition: background 0.5s;
        }
        .creature-card.stage2 { background: linear-gradient(135deg, #FFF3C4 0%, #FEDD8E 50%, #FFC94D 100%); }
        .creature-card.stage3 { background: linear-gradient(135deg, #E8F5E9 0%, #A5D6A7 50%, #66BB6A 100%); }
        .creature-card.stage4 { background: linear-gradient(135deg, #E3F2FD 0%, #90CAF9 50%, #42A5F5 100%); }
        .creature-card.stage5 { background: linear-gradient(135deg, #EDE7F6 0%, #B39DDB 50%, #7E57C2 100%); }
        .creature-card.stage6 { background: linear-gradient(135deg, #FCE4EC 0%, #F48FB1 50%, #EC407A 100%); }
        .creature-card.stage7 { background: linear-gradient(135deg, #FFF8E1 0%, #FFD54F 50%, #FF6F00 100%); }

        .creature-wrap { position: relative; z-index: 1; margin-bottom: 8px; }
        .creature-svg { animation: float 3s ease-in-out infinite; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes blink { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
        .creature-eyes { animation: blink 4s ease-in-out infinite; }

        .creature-name { font-size: 16px; font-weight: 700; color: #5D4037; margin-bottom: 2px; position: relative; z-index: 1; }
        .creature-level { font-size: 13px; color: #8D6E63; position: relative; z-index: 1; }

        .creature-message {
            margin-top: 12px; padding: 8px 16px; background: rgba(255,255,255,0.6);
            border-radius: 99px; display: inline-block; font-size: 13px; font-weight: 500;
            color: #5D4037; position: relative; z-index: 1;
        }

        .xp-section { margin-top: 16px; position: relative; z-index: 1; }
        .xp-bar-wrap { background: rgba(255,255,255,0.4); border-radius: 99px; height: 8px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: rgba(255,255,255,0.9); border-radius: 99px; transition: width 0.5s; }
        .xp-text { font-size: 11px; color: #8D6E63; margin-top: 6px; }

        /* TODAY SECTION */
        .today-section { display: flex; gap: 12px; margin-bottom: 20px; }
        .ring-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 120px; }
        .progress-ring { position: relative; width: 80px; height: 80px; }
        .progress-ring svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .progress-ring circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .progress-ring .bg { stroke: var(--border); }
        .progress-ring .fill { stroke: var(--primary); transition: stroke-dashoffset 0.6s ease; }
        .ring-pct { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 18px; font-weight: 700; }
        .ring-label { font-size: 12px; color: var(--text-sub); margin-top: 8px; }

        .streak-card { flex: 1; background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; justify-content: center; gap: 12px; }
        .streak-item { display: flex; align-items: center; gap: 8px; }
        .streak-icon { font-size: 20px; }
        .streak-info { flex: 1; }
        .streak-label { font-size: 12px; color: var(--text-sub); }
        .streak-value { font-size: 16px; font-weight: 700; }

        /* MINI CARDS */
        .mini-cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 20px; }
        .mini-card { background: var(--card); border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.15s; }
        .mini-card:active { transform: scale(0.97); }
        .mini-card-icon { font-size: 24px; margin-bottom: 8px; }
        .mini-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .mini-card-progress { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 8px; }
        .mini-card-progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
        .mini-card-stat { font-size: 11px; color: var(--text-sub); margin-top: 6px; }

        /* PHASE CARD */
        .phase-card { background: var(--card); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
        .phase-icon { font-size: 28px; }
        .phase-info { flex: 1; }
        .phase-title { font-size: 14px; font-weight: 600; }
        .phase-desc { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
        .phase-progress { height: 4px; background: var(--border); border-radius: 99px; margin-top: 8px; overflow: hidden; }
        .phase-progress-fill { height: 100%; background: var(--primary); border-radius: 99px; }

        /* TIMELINE */
        .timeline { position: relative; padding-left: 40px; margin-bottom: 20px; }
        .timeline::before { content: ''; position: absolute; left: 16px; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; margin-bottom: 12px; }
        .timeline-dot {
            position: absolute; left: -32px; top: 8px; width: 14px; height: 14px;
            border-radius: 50%; border: 2.5px solid var(--border); background: var(--card); z-index: 1;
        }
        .timeline-dot.done { background: var(--success); border-color: var(--success); }
        .timeline-dot.current { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 0 4px rgba(108,99,255,0.2); }
        .timeline-dot.upcoming { background: var(--card); border-color: var(--border); }
        .timeline-card {
            background: var(--card); border-radius: var(--radius-sm); padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); transition: transform 0.1s;
        }
        .timeline-card.current { border-left: 3px solid var(--primary); }
        .timeline-time { font-size: 11px; color: var(--text-sub); font-weight: 500; }
        .timeline-name { font-size: 14px; font-weight: 500; margin-top: 2px; }
        .timeline-detail { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
        .timeline-now { font-size: 11px; color: var(--primary); font-weight: 600; margin-top: 2px; }

        /* HABITS PAGE */
        .habit-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .habit-day-title { font-size: 18px; font-weight: 700; }
        .habit-day-count { font-size: 13px; color: var(--text-sub); }
        .habit-category { margin-bottom: 16px; }
        .habit-category-title { font-size: 12px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px; margin-bottom: 8px; }
        .habit-item { background: var(--card); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); transition: transform 0.1s; }
        .habit-item:active { transform: scale(0.98); }
        .habit-item.completed { opacity: 0.55; }
        .habit-item.completed .habit-item-name { text-decoration: line-through; }
        .habit-check { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .habit-check.checked { background: var(--success); border-color: var(--success); animation: checkPop 0.3s ease; }
        @keyframes checkPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
        .habit-check.checked::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }
        .habit-item-info { flex: 1; }
        .habit-item-name { font-size: 14px; font-weight: 500; }
        .habit-item-detail { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
        .habit-item-link { font-size: 11px; color: var(--primary); text-decoration: none; margin-top: 2px; display: inline-block; }
        .habit-input { width: 52px; padding: 4px 6px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; text-align: center; outline: none; }
        .habit-input:focus { border-color: var(--primary); }
        .habit-input-unit { font-size: 11px; color: var(--text-sub); }

        /* JOURNAL */
        .journal-section { margin-top: 20px; }
        .journal-card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .journal-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .journal-textarea { width: 100%; min-height: 70px; padding: 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; resize: none; outline: none; transition: border-color 0.2s; line-height: 1.6; }
        .journal-textarea:focus { border-color: var(--primary); }

        /* INSIGHTS */
        .insight-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 14px; }
        .insight-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
        .insight-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .insight-row:last-child { border-bottom: none; }
        .insight-label { font-size: 13px; color: var(--text-sub); }
        .insight-value { font-size: 14px; font-weight: 600; }

        /* WEEKLY BAR CHART */
        .weekly-bars { display: flex; align-items: flex-end; justify-content: space-between; height: 120px; padding: 0 8px; gap: 8px; }
        .weekly-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
        .weekly-bar { width: 100%; border-radius: 6px 6px 0 0; transition: height 0.4s; min-height: 4px; }
        .weekly-bar-label { font-size: 11px; color: var(--text-sub); }
        .weekly-bar-pct { font-size: 10px; font-weight: 600; color: var(--text); }

        /* HEATMAP */
        .heatmap { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
        .heatmap-cell { aspect-ratio: 1; border-radius: 4px; background: var(--border); }
        .heatmap-cell.l1 { background: #E8E8FD; } .heatmap-cell.l2 { background: #C4C1FF; }
        .heatmap-cell.l3 { background: #8B85FF; } .heatmap-cell.l4 { background: #6C63FF; }

        /* CATEGORY BARS */
        .category-bars { display: flex; flex-direction: column; gap: 10px; }
        .cat-bar-row { display: flex; align-items: center; gap: 10px; }
        .cat-bar-label { font-size: 12px; width: 60px; color: var(--text-sub); }
        .cat-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .cat-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
        .cat-bar-pct { font-size: 12px; font-weight: 600; width: 36px; text-align: right; }

        /* RUNNING STATS */
        .running-stats { display: flex; gap: 12px; }
        .running-stat { flex: 1; text-align: center; padding: 16px; background: var(--bg); border-radius: var(--radius-sm); }
        .running-stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
        .running-stat-label { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        /* EVOLUTION TIMELINE */
        .evo-timeline { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; overflow-x: auto; gap: 4px; }
        .evo-stage { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.3; min-width: 48px; }
        .evo-stage.reached { opacity: 1; }
        .evo-stage.current { opacity: 1; transform: scale(1.15); }
        .evo-label { font-size: 9px; color: var(--text-sub); }
        .evo-arrow { color: var(--border); font-size: 12px; }

        /* SETTINGS */
        .settings-card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .settings-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .settings-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 8px; }
        .settings-input:focus { border-color: var(--primary); }
        .link-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .link-item a { flex: 1; font-size: 12px; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .link-remove { color: var(--danger); font-size: 12px; cursor: pointer; }
        .btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--primary); color: white; }
        .btn:active { opacity: 0.85; }
        .add-link-row { display: flex; gap: 8px; margin-top: 8px; }
        .add-link-row input { flex: 1; }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 36px; padding: 10px 0 26px; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--text-light); font-size: 10px; font-weight: 500; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; }

        .page { display: none; } .page.active { display: block; }

        /* CELEBRATION */
        .celebration { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; z-index: 200; pointer-events: none; }
        .celebration.show { display: flex; }
        .celebration-emoji { font-size: 80px; animation: celebPop 1s ease forwards; }
        @keyframes celebPop { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.3);opacity:1} 100%{transform:scale(1);opacity:0} }

        /* Sparkle particles */
        .sparkles { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; overflow: hidden; }
        .sparkle { position: absolute; width: 4px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 50%; animation: sparkleFloat 3s ease-in-out infinite; }
        @keyframes sparkleFloat { 0%{transform:translateY(0) scale(0);opacity:0} 50%{opacity:1;transform:translateY(-20px) scale(1)} 100%{transform:translateY(-40px) scale(0);opacity:0} }
    </style>
</head>
<body>
    <div class="container">
        <!-- HOME -->
        <div id="page-home" class="page active">
            <div class="header">
                <div class="header-left">
                    <h2 id="greeting">좋은 아침!</h2>
                    <div class="date" id="currentDate"></div>
                </div>
                <div class="header-right"><span class="phase-badge" id="phaseBadge">적응기</span></div>
            </div>
            <div class="creature-card" id="creatureCard">
                <div class="sparkles" id="sparkles"></div>
                <div class="creature-wrap" id="creatureWrap"></div>
                <div class="creature-name" id="creatureName">작은 씨앗</div>
                <div class="creature-level" id="creatureLevel">Lv.1</div>
                <div class="creature-message" id="creatureMsg">모든 건 작은 씨앗에서 시작돼요</div>
                <div class="xp-section">
                    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
                    <div class="xp-text" id="xpText">0 / 100 XP</div>
                </div>
            </div>
            <div class="today-section">
                <div class="ring-card">
                    <div class="progress-ring">
                        <svg viewBox="0 0 80 80"><circle class="bg" cx="40" cy="40" r="34"/><circle class="fill" id="progressCircle" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="213.6"/></svg>
                        <div class="ring-pct" id="ringPct">0%</div>
                    </div>
                    <div class="ring-label">오늘 달성률</div>
                </div>
                <div class="streak-card">
                    <div class="streak-item"><span class="streak-icon">🔥</span><div class="streak-info"><div class="streak-label">연속 달성</div><div class="streak-value" id="streakDays">0일</div></div></div>
                    <div class="streak-item"><span class="streak-icon">📅</span><div class="streak-info"><div class="streak-label">진행일</div><div class="streak-value" id="dayCountHome">Day 1</div></div></div>
                </div>
            </div>
            <div class="mini-cards" id="miniCards"></div>

            <!-- Daily Timeline -->
            <h3 style="font-size:16px;font-weight:700;margin-bottom:14px;">오늘의 흐름</h3>
            <div class="timeline" id="dailyTimeline"></div>

            <div class="phase-card" id="phaseCard"></div>
        </div>

        <!-- HABITS -->
        <div id="page-habits" class="page">
            <div class="habit-day-header">
                <div class="habit-day-title" id="habitDayTitle">월요일</div>
                <div class="habit-day-count" id="habitDayCount">0/0</div>
            </div>
            <div id="habitList"></div>
            <div class="journal-section">
                <div class="journal-card"><h3>📝 오늘 할 일</h3><textarea class="journal-textarea" id="todoInput" placeholder="오늘 집중할 것들..."></textarea></div>
                <div class="journal-card"><h3>🙏 감사일기</h3><textarea class="journal-textarea" id="gratitudeInput" placeholder="오늘 감사한 것 3가지..."></textarea></div>
            </div>
        </div>

        <!-- INSIGHTS -->
        <div id="page-insights" class="page">
            <h2 style="font-size:20px;font-weight:700;margin-bottom:16px;">인사이트</h2>

            <div class="insight-card">
                <h3>📊 이번 주 요일별 달성률</h3>
                <div class="weekly-bars" id="weeklyBars"></div>
            </div>

            <div class="insight-card">
                <h3>🏃 러닝 기록</h3>
                <div class="running-stats" id="runningStats"></div>
            </div>

            <div class="insight-card">
                <h3>📈 카테고리별 달성률</h3>
                <div class="category-bars" id="categoryBars"></div>
            </div>

            <div class="insight-card">
                <h3>🌱 크리처 성장 과정</h3>
                <div class="evo-timeline" id="evoTimeline"></div>
            </div>

            <div class="insight-card">
                <h3>🟩 180일 히트맵</h3>
                <div class="heatmap" id="heatmap"></div>
            </div>

            <div class="insight-card">
                <h3>🏅 이번 주 리포트</h3>
                <div id="weeklyReport"></div>
            </div>

            <div class="insight-card">
                <h3>🔥 습관별 스트릭</h3>
                <div id="habitStreaks"></div>
            </div>
        </div>

        <!-- SETTINGS -->
        <div id="page-settings" class="page">
            <h2 style="font-size:20px;font-weight:700;margin-bottom:16px;">설정</h2>
            <div class="settings-card"><h3>챌린지 시작일</h3><input type="date" class="settings-input" id="startDateInput" onchange="saveStartDate()"></div>
            <div class="settings-card"><h3>크리처 이름</h3><input type="text" class="settings-input" id="creatureNameInput" placeholder="이름을 지어주세요" onchange="saveCreatureName()"></div>
            <div class="settings-card"><h3>현재 읽는 책</h3><input type="text" class="settings-input" id="bookInput" placeholder="책 제목" onchange="saveBook()"></div>
            <div class="settings-card"><h3>홈트 영상 링크</h3><div id="workoutLinksContainer"></div><div class="add-link-row"><input class="settings-input" id="newWorkoutLink" placeholder="유튜브 링크"><button class="btn" onclick="addLink('workout')">추가</button></div></div>
            <div class="settings-card"><h3>영어 학습 링크</h3><div id="englishLinksContainer"></div><div class="add-link-row"><input class="settings-input" id="newEnglishLink" placeholder="유튜브 링크"><button class="btn" onclick="addLink('english')">추가</button></div></div>
        </div>
    </div>

    <div class="celebration" id="celebration"><div class="celebration-emoji" id="celebEmoji">🎉</div></div>

// ============ SVG CREATURE ============
function renderCreatureSVG(stage, size) {
    const s = size || stage.bodySize;
    const e = stage.eyeSize;
    const c = stage.bodyColor;
    const half = s / 2;
    // Generate bumpy circle path
    const bumps = 10 + Math.floor(s / 10);
    let path = '';
    for (let i = 0; i <= bumps; i++) {
        const angle = (i / bumps) * Math.PI * 2;
        const r = half + Math.sin(i * 3.7) * (half * 0.15);
        const x = 60 + Math.cos(angle) * r;
        const y = 60 + Math.sin(angle) * r;
        path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }
    path += 'Z';

    const eyeOffset = half * 0.25;
    const eyeY = 60 - half * 0.05;
    const pupilSize = e * 0.55;

    // Blush
    const blushY = eyeY + e + 2;

    return `
        <svg class="creature-svg" width="120" height="120" viewBox="0 0 120 120">
            <path d="${path}" fill="${c}" stroke="none">
                <animate attributeName="d" dur="4s" repeatCount="indefinite"
                    values="${path};${generateBumpPath(half, bumps, 60, 60, 0.12)};${path}"/>
            </path>
            <g class="creature-eyes">
                <ellipse cx="${60-eyeOffset}" cy="${eyeY}" rx="${e}" ry="${e*1.1}" fill="white"/>
                <ellipse cx="${60+eyeOffset}" cy="${eyeY}" rx="${e}" ry="${e*1.1}" fill="white"/>
                <circle cx="${60-eyeOffset+1}" cy="${eyeY+1}" r="${pupilSize}" fill="#2D2D2D"/>
                <circle cx="${60+eyeOffset+1}" cy="${eyeY+1}" r="${pupilSize}" fill="#2D2D2D"/>
                <circle cx="${60-eyeOffset+2}" cy="${eyeY-1}" r="${pupilSize*0.35}" fill="white"/>
                <circle cx="${60+eyeOffset+2}" cy="${eyeY-1}" r="${pupilSize*0.35}" fill="white"/>
            </g>
            <ellipse cx="${60-eyeOffset-3}" cy="${blushY}" rx="4" ry="2.5" fill="rgba(255,150,150,0.4)"/>
            <ellipse cx="${60+eyeOffset+3}" cy="${blushY}" rx="4" ry="2.5" fill="rgba(255,150,150,0.4)"/>
        </svg>
    `;
}

function generateBumpPath(half, bumps, cx, cy, variance) {
    let path = '';
    for (let i = 0; i <= bumps; i++) {
        const angle = (i / bumps) * Math.PI * 2;
        const r = half + Math.sin(i * 3.7 + 1) * (half * variance);
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }
    return path + 'Z';
}

function renderTimeline(todayData) {
    const tl = document.getElementById('dailyTimeline');
    const nowH = new Date().getHours();
    const nowM = new Date().getMinutes();
    const nowMinutes = nowH * 60 + nowM;

    let html = '';
    DAILY_TIMELINE.forEach((item, i) => {
        const [h, m] = item.time.split(':').map(Number);
        const itemMinutes = h * 60 + m;
        const nextItem = DAILY_TIMELINE[i + 1];
        const nextMinutes = nextItem ? parseInt(nextItem.time.split(':')[0]) * 60 + parseInt(nextItem.time.split(':')[1]) : 1440;

        let status = 'upcoming';
        if (nowMinutes >= nextMinutes) status = 'done';
        else if (nowMinutes >= itemMinutes) status = 'current';

        const isDone = item.ids.some(id => todayData[id]);
        if (isDone) status = 'done';

        html += `
            <div class="timeline-item">
                <div class="timeline-dot ${status}"></div>
                <div class="timeline-card ${status === 'current' ? 'current' : ''}">
                    <div class="timeline-time">${item.time}</div>
                    <div class="timeline-name">${item.label}</div>
                    ${status === 'current' ? '<div class="timeline-now">← 지금</div>' : ''}
                </div>
            </div>
        `;
    });
    tl.innerHTML = html;
}

    // Running stats
    const rs=document.getElementById('runningStats');
    let totalKm=0,runDays=0;
    Object.entries(data.running).forEach(([k,v])=>{if(v>0){totalKm+=v;runDays++;}});
    rs.innerHTML=`<div class="running-stat"><div class="running-stat-value">${totalKm.toFixed(1)}</div><div class="running-stat-label">총 거리 (km)</div></div><div class="running-stat"><div class="running-stat-value">${runDays}</div><div class="running-stat-label">러닝 횟수</div></div><div class="running-stat"><div class="running-stat-value">${runDays>0?(totalKm/runDays).toFixed(1):'0'}</div><div class="running-stat-label">평균 (km)</div></div>`;

    // Category bars
    const cb=document.getElementById('categoryBars');
    const catStats=getCategoryStats();
    cb.innerHTML=CATEGORIES.map(c=>`<div class="cat-bar-row"><div class="cat-bar-label">${c}</div><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${catStats[c]||0}%;background:${CAT_COLORS[c]}"></div></div><div class="cat-bar-pct">${catStats[c]||0}%</div></div>`).join('');

    // Evolution timeline
    const evo=document.getElementById('evoTimeline');
    const stageIdx=getStageIndex();
    evo.innerHTML=STAGES.map((s,i)=>{
        const cls=i<stageIdx?'reached':i===stageIdx?'current':'';
        const miniSvg=`<svg width="32" height="32" viewBox="0 0 120 120"><circle cx="60" cy="60" r="${s.bodySize/2}" fill="${s.bodyColor}"/><circle cx="52" cy="56" r="3" fill="#2D2D2D"/><circle cx="68" cy="56" r="3" fill="#2D2D2D"/></svg>`;
        return `${i>0?'<span class="evo-arrow">→</span>':''}<div class="evo-stage ${cls}">${miniSvg}<div class="evo-label">Lv.${s.minLv}</div></div>`;
    }).join('');

    // Heatmap
    const hm=document.getElementById('heatmap');
    let hmHtml='';
    const start=new Date(data.startDate);
    for(let i=0;i<Math.min(dayCount(),180);i++){
        const dd=new Date(start);dd.setDate(start.getDate()+i);
        const ds=dd.toISOString().split('T')[0];
        const comp=getCompletionForDate(ds);
        let lvl='';if(comp>0.8)lvl='l4';else if(comp>0.6)lvl='l3';else if(comp>0.3)lvl='l2';else if(comp>0)lvl='l1';
        hmHtml+=`<div class="heatmap-cell ${lvl}"></div>`;
    }
    hm.innerHTML=hmHtml;

    // Weekly report
    const wr=document.getElementById('weeklyReport');
    const wd=getWeekData();
    wr.innerHTML=`<div class="insight-row"><span class="insight-label">평균 달성률</span><span class="insight-value">${wd.avgPct}%</span></div><div class="insight-row"><span class="insight-label">최고의 날</span><span class="insight-value">${wd.bestDay}</span></div><div class="insight-row"><span class="insight-label">획득 XP</span><span class="insight-value">${wd.weekXP} XP</span></div><div class="insight-row"><span class="insight-label">현재 레벨</span><span class="insight-value">Lv.${data.level}</span></div>`;

    // Streaks
    const st=document.getElementById('habitStreaks');
    const ids=['meditation','workout','running','english-shadow','english-grammar','japanese','marketing','reels','income','reading','morning','diet','work-block'];
    const names={meditation:'명상',workout:'홈트',running:'러닝','english-shadow':'쉐도잉','english-grammar':'문법',japanese:'일본어',marketing:'마케팅',reels:'릴스',income:'수익활동',reading:'독서',morning:'기상',diet:'식단','work-block':'업무블록'};
    st.innerHTML=ids.map(id=>`<div class="insight-row"><span class="insight-label">${names[id]||id}</span><span class="insight-value">${calcStreak(id)}일</span></div>`).join('');
}

function renderSettings(){
    document.getElementById('startDateInput').value=data.startDate;
    document.getElementById('creatureNameInput').value=data.creatureName||'';
    document.getElementById('bookInput').value=data.book||'';
    ['workout','english'].forEach(type=>{
        document.getElementById(type+'LinksContainer').innerHTML=(data.links[type]||[]).map((url,i)=>`<div class="link-item"><a href="${url}" target="_blank">${url}</a><span class="link-remove" onclick="removeLink('${type}',${i})">삭제</span></div>`).join('');
    });
}

// ============ ACTIONS ============
function toggleHabit(id){
    if(!data.habits[td()])data.habits[td()]={};
    const was=data.habits[td()][id];
    data.habits[td()][id]=!was;
    if(!was){addXP(10);if(id==='english-grammar')data.englishProgress=Math.min(30,(data.englishProgress||0)+1);}
    else data.xp=Math.max(0,data.xp-10);
    save();render();
}
function saveRunning(v){data.running[td()]=parseFloat(v)||0;if(data.running[td()]>0){if(!data.habits[td()])data.habits[td()]={};data.habits[td()]['running']=true;addXP(10);}save();render();}
document.addEventListener('input',e=>{if(!data.journals[td()])data.journals[td()]={};if(e.target.id==='todoInput'){data.journals[td()].todo=e.target.value;save();}if(e.target.id==='gratitudeInput'){data.journals[td()].gratitude=e.target.value;save();}});
function addLink(type){const input=document.getElementById(type==='workout'?'newWorkoutLink':'newEnglishLink');if(input.value.trim()){data.links[type].push(input.value.trim());input.value='';save();renderSettings();}}
function removeLink(type,i){data.links[type].splice(i,1);save();renderSettings();}
function saveStartDate(){data.startDate=document.getElementById('startDateInput').value;save();render();}
function saveCreatureName(){data.creatureName=document.getElementById('creatureNameInput').value;save();render();}
function saveBook(){data.book=document.getElementById('bookInput').value;save();}

// ============ HELPERS ============
function getCompletionForDate(ds){const d=data.habits[ds];if(!d)return 0;const date=new Date(ds);const h=HABITS_BY_DAY[date.getDay()]||[];if(!h.length)return 0;return h.filter(x=>d[x.id]).length/h.length;}
function calcOverallStreak(){let s=0,d=new Date();for(let i=0;i<180;i++){const ds=d.toISOString().split('T')[0];const c=getCompletionForDate(ds);if(c>=0.7)s++;else if(i>0)break;d.setDate(d.getDate()-1);}return s;}
function calcStreak(hid){let s=0,d=new Date();for(let i=0;i<180;i++){const ds=d.toISOString().split('T')[0];const dw=d.getDay();const h=HABITS_BY_DAY[dw]||[];if(h.some(x=>x.id===hid)){if(data.habits[ds]&&data.habits[ds][hid])s++;else break;}d.setDate(d.getDate()-1);}return s;}
function getWeekData(){const days=['일','월','화','수','목','금','토'];let tp=0,cnt=0,bp=0,bd='-',wx=0;const d=new Date();const sw=new Date(d);sw.setDate(d.getDate()-d.getDay()+1);for(let i=0;i<7;i++){const date=new Date(sw);date.setDate(sw.getDate()+i);const ds=date.toISOString().split('T')[0];if(ds>td())break;const c=getCompletionForDate(ds);tp+=c;cnt++;if(c>bp){bp=c;bd=days[date.getDay()];}const h=HABITS_BY_DAY[date.getDay()]||[];const dd=data.habits[ds]||{};wx+=h.filter(x=>dd[x.id]).length*10;}return{avgPct:cnt>0?Math.round(tp/cnt*100):0,bestDay:bd,weekXP:wx};}
function getCategoryStats(){const s={};const d=new Date();const sw=new Date(d);sw.setDate(d.getDate()-d.getDay()+1);CATEGORIES.forEach(c=>{s[c]={total:0,done:0};});for(let i=0;i<7;i++){const date=new Date(sw);date.setDate(sw.getDate()+i);const ds=date.toISOString().split('T')[0];if(ds>td())break;const h=HABITS_BY_DAY[date.getDay()]||[];const dd=data.habits[ds]||{};h.forEach(x=>{if(s[x.cat]){s[x.cat].total++;if(dd[x.id])s[x.cat].done++;}});}const r={};CATEGORIES.forEach(c=>{r[c]=s[c].total>0?Math.round(s[c].done/s[c].total*100):0;});return r;}
function celebrate(e){const el=document.getElementById('celebration');document.getElementById('celebEmoji').textContent=e;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
function switchPage(p,el){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');if(p==='home')renderHome();if(p==='insights')renderInsights();}

render();
</script>
</body>
